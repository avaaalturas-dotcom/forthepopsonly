<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Father's Day</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#faf4ee;
    font-family:Georgia, serif;
}

.card{
    max-width:900px;
    text-align:center;
    padding:40px;
    background:white;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

h1{
    color:#8b5e3c;
}

button{
    margin-top:40px;
    padding:12px 28px;
    border:none;
    border-radius:25px;
    background:#8b5e3c;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
	background:#a06d47;
	box-shadow:0 5px 15px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div class="card">
<img src = "dad.png" alt "babe and the pops" width = "250">
    <h1>Happy Father's Day ❤️</h1>

    <p>
        Thank you for always supporting me, encouraging me, and believing in me.
        Your love and guidance mean more than words can express.
        Wishing you a wonderful Father's Day filled with happiness and love.
    </p>

    <button onclick="window.location.href='video.html'">
        One More Surprise 🎁
    </button>
</div>

</body>
</html>
