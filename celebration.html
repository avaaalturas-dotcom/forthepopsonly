<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Father's Day!</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{
    margin:0;
    background:#f5efe6;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    font-family:Arial, sans-serif;
}

#photo{
    display:none;
    max-width:80%;
    max-height:80vh;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.25);
}

h1{
    position:absolute;
    top:30px;
    color:#8b5e3c;
}
</style>
</head>

<body>

<h1>Congratulations here is your prize!</h1>

<img id="photo" src="tshirtphoto.png" alt="tshirtphoto">

<script>

// Big confetti explosion
confetti({
    particleCount: 300,
    spread: 180,
    origin: { y: 0.6 }
});

// Second burst
setTimeout(() => {
    confetti({
        particleCount: 200,
        spread: 120
    });
}, 800);

// Show photo after 3 seconds
setTimeout(() => {
    document.getElementById("photo").style.display = "block";
}, 3000);

</script>

</body>
</html>
