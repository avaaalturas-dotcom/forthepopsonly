<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Father's Day</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
}

.container{
    text-align:center;
}

.envelope{
    width:250px;
    height:160px;
    background:#d9b99b;
    position:relative;
    margin:auto;
    border-radius:5px;
}

.envelope:before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:0;
    height:0;
    border-left:125px solid transparent;
    border-right:125px solid transparent;
    border-top:80px solid #c69c72;
}

button{
    margin-top:40px;
    padding:12px 28px;
    border:none;
    border-radius:25px;
    background:#8b5e3c;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
	background:#a06d47;
	box-shadow:0 5px 15px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div class="card">
<div class="container">
    <div class="envelope">✉️</div>

    <button onclick="window.location.href='letter.html'">
        Open ✉️
    </button>
</div>

</body>
</html>
